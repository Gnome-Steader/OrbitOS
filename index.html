
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT OS v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07071a;--bg2:#0c0c25;--surface:rgba(10,10,32,0.88);--surface2:rgba(16,16,45,0.92);
  --surface3:rgba(22,22,58,0.95);--border:rgba(0,200,255,0.18);--border2:rgba(139,92,246,0.22);
  --blue:#00c8ff;--purple:#8b5cf6;--pink:#ec4899;--green:#10b981;--amber:#f59e0b;
  --text:#e2e4f0;--text-dim:#8b8fba;--text-muted:#4a4d6b;
  --win-h:36px;--dock-h:68px;--radius:14px;--radius-sm:8px;
  --glow-b:0 0 24px rgba(0,200,255,0.35);--glow-p:0 0 24px rgba(139,92,246,0.35);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);user-select:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.4);border-radius:2px}

/* === NEBULA BACKGROUND === */
#nebula-bg{position:fixed;inset:0;overflow:hidden;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(30,10,80,0.6) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 70%,rgba(0,40,80,0.5) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 50%,rgba(15,5,50,0.4) 0%,transparent 70%),#07071a}
#nebula-cloud1{position:absolute;width:600px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(60,10,120,0.25) 0%,transparent 70%);top:-100px;left:-100px;animation:driftA 30s ease-in-out infinite alternate}
#nebula-cloud2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,60,120,0.2) 0%,transparent 70%);bottom:-150px;right:-100px;animation:driftB 25s ease-in-out infinite alternate}
#nebula-cloud3{position:absolute;width:400px;height:300px;border-radius:50%;background:radial-gradient(ellipse,rgba(80,0,100,0.18) 0%,transparent 70%);top:30%;left:40%;animation:driftC 35s ease-in-out infinite alternate}
#stars-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
@keyframes driftA{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,40px) scale(1.15)}}
@keyframes driftB{from{transform:translate(0,0) scale(1)}to{transform:translate(-50px,-30px) scale(1.2)}}
@keyframes driftC{from{transform:translate(0,0) scale(1) rotate(0deg)}to{transform:translate(30px,-50px) scale(1.1) rotate(10deg)}}

/* === BOOT SCREEN === */
#boot{position:fixed;inset:0;z-index:99999;background:#030310;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity 0.8s}
#boot.hidden{opacity:0;pointer-events:none}
#boot-logo{width:80px;height:80px;border-radius:20px;animation:bootPulse 2s ease-in-out infinite}
#boot-logo img{width:100%;height:100%;border-radius:20px;object-fit:cover}
#boot-name{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeInUp 0.8s ease forwards}
#boot-sub{font-size:13px;letter-spacing:4px;color:var(--text-dim);font-weight:500;text-transform:uppercase;animation:fadeInUp 0.8s 0.2s ease both}
#boot-bar-wrap{width:240px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
#boot-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width 0.1s linear;box-shadow:var(--glow-b)}
#boot-status{font-size:11px;color:var(--text-muted);letter-spacing:2px;min-height:16px;font-family:'JetBrains Mono',monospace}
@keyframes bootPulse{0%,100%{box-shadow:0 0 30px rgba(0,200,255,0.4)}50%{box-shadow:0 0 60px rgba(139,92,246,0.6)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* === DESKTOP === */
#os{position:fixed;inset:0;z-index:2;display:none}
#desktop{position:absolute;inset:0;bottom:var(--dock-h);padding:20px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px}
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:12px;cursor:pointer;width:76px;transition:background 0.15s;position:relative}
.desk-icon:hover{background:rgba(0,200,255,0.1)}
.desk-icon:active .desk-icon-img{transform:scale(0.92)}
.desk-icon-img{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 0.15s,box-shadow 0.15s}
.desk-icon:hover .desk-icon-img{box-shadow:0 0 20px rgba(0,200,255,0.4);transform:translateY(-2px)}
.desk-icon-label{font-size:11px;color:var(--text);text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.8);line-height:1.2;max-width:72px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.desk-icon.selected{background:rgba(139,92,246,0.2)}

/* === CONTEXT MENU === */
#ctx-menu{position:fixed;z-index:90000;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:160px;box-shadow:0 16px 48px rgba(0,0,0,0.6);display:none}
.ctx-item{padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s}
.ctx-item:hover{background:rgba(0,200,255,0.12);color:var(--blue)}
.ctx-sep{height:1px;background:var(--border);margin:4px 2px}

/* === DOCK === */
#dock{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;align-items:center;gap:6px;background:rgba(8,8,28,0.78);backdrop-filter:blur(32px) saturate(1.5);border:1px solid rgba(0,200,255,0.14);border-radius:22px;padding:8px 16px;box-shadow:0 12px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.05)}
.dock-sep{width:1px;height:36px;background:var(--border);margin:0 4px}
.dock-item{position:relative;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border-radius:14px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0}
.dock-item:hover{transform:scale(1.32) translateY(-8px)}
.dock-item.active::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue);box-shadow:var(--glow-b)}
.dock-tooltip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;color:var(--text-dim)}
.dock-item:hover .dock-tooltip{opacity:1}
#dock-clock{font-family:'Orbitron',monospace;font-size:12px;font-weight:500;color:var(--blue);letter-spacing:2px;padding:0 8px;text-shadow:var(--glow-b);line-height:1.3;text-align:center}
#dock-date{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-align:center}

/* === WINDOWS === */
#windows-layer{position:absolute;inset:0}
.window{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 0.5px rgba(255,255,255,0.04) inset;transition:box-shadow 0.2s;display:flex;flex-direction:column;min-width:300px;min-height:200px;opacity:0;transform:scale(0.9);transition:opacity 0.25s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.window.open{opacity:1;transform:scale(1)}
.window.focused{border-color:rgba(0,200,255,0.3);box-shadow:0 24px 80px rgba(0,0,0,0.7),var(--glow-b),0 0 0 0.5px rgba(255,255,255,0.04) inset}
.window.minimized{opacity:0;transform:scale(0.7) translateY(80px);pointer-events:none}
.window.maximized{border-radius:0!important;border:none!important}
.win-titlebar{height:var(--win-h);background:var(--surface2);display:flex;align-items:center;padding:0 12px;gap:8px;cursor:grab;flex-shrink:0;border-bottom:1px solid var(--border)}
.win-titlebar:active{cursor:grabbing}
.win-controls{display:flex;gap:6px;margin-right:4px}
.win-btn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;transition:filter 0.15s,transform 0.1s}
.win-btn:active{transform:scale(0.85)}
.win-btn.close{background:#ff5f57}
.win-btn.minimize{background:#febc2e}
.win-btn.maximize{background:#28c840}
.win-btn:hover{filter:brightness(1.3)}
.win-icon{font-size:16px;flex-shrink:0}
.win-title{font-size:13px;font-weight:600;letter-spacing:0.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
.win-content{flex:1;overflow:hidden;position:relative}
.win-resize{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize;z-index:1;opacity:0.3}
.win-resize:hover{opacity:0.8}
.win-resize::after{content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-right:2px solid var(--blue);border-bottom:2px solid var(--blue);border-radius:0 0 2px 0}

/* === BROWSER APP === */
.browser{display:flex;flex-direction:column;height:100%;background:var(--bg2)}
.browser-tabbar{display:flex;align-items:center;background:var(--surface2);height:36px;padding:4px 4px 0;gap:2px;overflow-x:auto;overflow-y:hidden;flex-shrink:0;border-bottom:1px solid var(--border)}
.browser-tabbar::-webkit-scrollbar{height:2px}
.b-tab{display:flex;align-items:center;gap:6px;padding:0 10px;height:28px;border-radius:8px 8px 0 0;font-size:12px;cursor:pointer;white-space:nowrap;max-width:160px;min-width:80px;background:transparent;transition:background 0.15s;flex-shrink:0;position:relative;color:var(--text-dim)}
.b-tab.active{background:var(--bg2);color:var(--text)}
.b-tab:hover:not(.active){background:rgba(255,255,255,0.04)}
.b-tab-title{flex:1;overflow:hidden;text-overflow:ellipsis}
.b-tab-close{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:background 0.1s;color:var(--text-dim)}
.b-tab-close:hover{background:rgba(255,95,87,0.3);color:#ff5f57}
.b-tab-new{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:16px;color:var(--text-dim);flex-shrink:0;transition:background 0.15s,color 0.15s}
.b-tab-new:hover{background:rgba(0,200,255,0.12);color:var(--blue)}
.browser-nav{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface2);flex-shrink:0;border-bottom:1px solid var(--border)}
.b-nav-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.1s,color 0.1s;color:var(--text-dim);font-size:13px;flex-shrink:0}
.b-nav-btn:hover{background:rgba(0,200,255,0.12);color:var(--blue)}
.b-nav-btn.disabled{opacity:0.3;pointer-events:none}
.b-urlbar{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:0 14px;height:28px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.b-urlbar:focus{border-color:var(--blue);box-shadow:var(--glow-b)}
.b-urlbar.incognito{border-color:rgba(139,92,246,0.4);box-shadow:var(--glow-p)}
.b-extras{display:flex;gap:4px;align-items:center}
.b-extra-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text-dim);transition:background 0.1s,color 0.1s}
.b-extra-btn:hover{background:rgba(139,92,246,0.15);color:var(--purple)}
.browser-main{flex:1;overflow:hidden;position:relative}
.b-frame-wrap{position:absolute;inset:0}
.b-frame{width:100%;height:100%;border:none;background:#fff}
.b-home{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg2)}
.b-home-logo{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}
.b-search{display:flex;gap:8px;align-items:center;width:100%;max-width:500px}
.b-search-bar{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:0 20px;height:44px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;font-family:'Rajdhani',sans-serif}
.b-search-bar:focus{border-color:var(--blue);box-shadow:var(--glow-b)}
.b-search-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;box-shadow:var(--glow-b)}
.b-search-btn:hover{transform:scale(1.05)}
.b-bookmarks-bar{display:flex;gap:4px;padding:0 10px 6px;flex-wrap:nowrap;overflow-x:auto;flex-shrink:0;border-bottom:1px solid rgba(0,200,255,0.08)}
.b-bookmark{display:flex;align-items:center;gap:5px;padding:2px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;color:var(--text-dim);transition:background 0.1s,color 0.1s}
.b-bookmark:hover{background:rgba(0,200,255,0.1);color:var(--blue)}
.b-quick-links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.b-quick-link{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;border-radius:12px;cursor:pointer;transition:background 0.15s;width:72px}
.b-quick-link:hover{background:rgba(0,200,255,0.08)}
.b-quick-link-ico{width:40px;height:40px;border-radius:10px;font-size:20px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border)}
.b-quick-link span{font-size:11px;color:var(--text-dim)}
.b-status{position:absolute;bottom:6px;left:10px;font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity 0.2s}
.b-status.show{opacity:1}
.b-loading{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--purple));z-index:10;transform-origin:left;animation:loadSweep 1.5s ease-in-out infinite;display:none}
.b-loading.show{display:block}
@keyframes loadSweep{0%{transform:scaleX(0);opacity:1}70%{transform:scaleX(0.7);opacity:1}100%{transform:scaleX(1);opacity:0}}
.b-bkm-panel{position:absolute;right:0;top:0;bottom:0;width:260px;background:var(--surface2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.3s ease;z-index:5;display:flex;flex-direction:column}
.b-bkm-panel.open{transform:translateX(0)}
.b-bkm-header{padding:14px;border-bottom:1px solid var(--border);font-family:'Orbitron',monospace;font-size:12px;font-weight:600;color:var(--blue);letter-spacing:1px}
.b-bkm-list{flex:1;overflow-y:auto;padding:8px}
.b-bkm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.1s;font-size:12px}
.b-bkm-item:hover{background:rgba(0,200,255,0.08)}
.b-bkm-item span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-bkm-del{font-size:11px;color:var(--text-muted);flex-shrink:0;padding:2px 6px;border-radius:4px}
.b-bkm-del:hover{color:#ff5f57;background:rgba(255,95,87,0.1)}
.b-error{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg2);padding:40px}
.b-error-icon{font-size:48px}
.b-error h2{font-family:'Orbitron',monospace;font-size:18px;color:var(--text)}
.b-error p{color:var(--text-dim);font-size:13px;text-align:center;max-width:400px;line-height:1.6}
.b-scramjet-info{background:rgba(0,200,255,0.06);border:1px solid rgba(0,200,255,0.15);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);max-width:480px;word-break:break-all;line-height:1.5}
.b-scramjet-info strong{color:var(--blue);display:block;margin-bottom:4px}

/* === NOTES APP === */
.notes{display:flex;height:100%;background:var(--bg2)}
.notes-sidebar{width:180px;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.notes-sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notes-sidebar-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:600;color:var(--blue);letter-spacing:2px}
.notes-add-btn{width:22px;height:22px;border-radius:6px;background:rgba(0,200,255,0.12);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--blue);transition:background 0.1s}
.notes-add-btn:hover{background:rgba(0,200,255,0.25)}
.notes-list{flex:1;overflow-y:auto;padding:6px}
.note-item{padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.1s;border:1px solid transparent}
.note-item:hover{background:rgba(0,200,255,0.06)}
.note-item.active{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.2)}
.note-item-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-preview{font-size:10px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-date{font-size:9px;color:var(--text-muted);margin-top:3px}
.notes-editor{flex:1;display:flex;flex-direction:column}
.notes-editor-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.notes-title-input{flex:1;background:transparent;border:none;font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:var(--text);outline:none}
.notes-del-btn{font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:5px}
.notes-del-btn:hover{color:#ff5f57;background:rgba(255,95,87,0.1)}
.notes-body{flex:1;padding:16px;background:transparent;border:none;resize:none;font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text);line-height:1.7;outline:none}

/* === CHAT APP === */
.chat{display:flex;flex-direction:column;height:100%;background:var(--bg2)}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface2)}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--glow-p)}
.chat-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:var(--blue);letter-spacing:1px}
.chat-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.chat-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{display:flex;gap:10px;align-items:flex-start;animation:msgIn 0.3s ease}
.chat-msg.user{flex-direction:row-reverse}
.chat-msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.chat-msg.user .chat-msg-avatar{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.3)}
.chat-msg.ai .chat-msg-avatar{background:rgba(0,200,255,0.15);border:1px solid rgba(0,200,255,0.25)}
.chat-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55;max-width:75%;word-wrap:break-word}
.chat-msg.user .chat-bubble{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.25);color:var(--text);border-radius:12px 4px 12px 12px}
.chat-msg.ai .chat-bubble{background:rgba(10,10,35,0.7);border:1px solid rgba(0,200,255,0.15);color:var(--text);border-radius:4px 12px 12px 12px}
.chat-typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:typeDot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}

<script>
// ==========================================
// ORBIT OS — CORE SYSTEMS
// ==========================================

// === SCRAMJET URL UTILITIES ===
const Scramjet = {
  PREFIX: '__orbit_proxy__/',
  BARE_SERVER: '/bare/',
  SW_PATH: '/scramjet/worker/scramjet.worker.js',

  encode(url) {
    try {
      const bytes = new TextEncoder().encode(url);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    } catch { return btoa(url); }
  },

  decode(enc) {
    try {
      const padded = enc.replace(/-/g,'+').replace(/_/g,'/') + '=='.slice(0,(4-enc.length%4)%4);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    } catch { return enc; }
  },

  rewrite(url) {
    if (!url) return '';
    if (url.startsWith('orbit://')) return url;
    if (!url.match(/^https?:\/\//i)) url = 'https://' + url;
    return this.PREFIX + this.encode(url);
  },

  extract(proxied) {
    if (proxied.startsWith(this.PREFIX)) {
      return this.decode(proxied.slice(this.PREFIX.length));
    }
    return proxied;
  },

  isProxied(url) { return url && url.startsWith(this.PREFIX); },

  getDisplayUrl(url) {
    if (!url) return '';
    if (url.startsWith('orbit://')) return url;
    if (this.isProxied(url)) return this.extract(url.slice(this.PREFIX.length));
    return url;
  },

  getBareConfig() {
    return { server: this.BARE_SERVER, version: 3 };
  },

  getServiceWorkerConfig() {
    return {
      path: this.SW_PATH,
      prefix: '/' + this.PREFIX,
      codec: 'base64url',
      bareServer: this.BARE_SERVER
    };
  }
};

// === STAR FIELD ===
class StarField {
  constructor() {
    this.canvas = document.getElementById('stars-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.stars = [];
    this.resize();
    this.init();
    window.addEventListener('resize', () => { this.resize(); this.init(); });
    this.animate();
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }

  init() {
    this.stars = [];
    const count = Math.floor((this.canvas.width * this.canvas.height) / 3000);
    for (let i = 0; i < count; i++) {
      this.stars.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.008 + 0.002,
        phase: Math.random() * Math.PI * 2,
        color: Math.random() > 0.9 ? '#8b5cf6' : Math.random() > 0.8 ? '#00c8ff' : '#ffffff'
      });
    }
  }

  animate() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    const t = Date.now() * 0.001;
    this.stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 10 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(() => this.animate());
  }
}

// === WINDOW MANAGER ===
class WindowManager {
  constructor() {
    this.windows = {};
    this.z = 100;
    this.layer = document.getElementById('windows-layer');
    this.dragging = null;
    this.resizing = null;
    document.addEventListener('mousemove', e => this._onMouseMove(e));
    document.addEventListener('mouseup', () => this._onMouseUp());
    document.addEventListener('touchmove', e => this._onMouseMove(e.touches[0]), {passive:false});
    document.addEventListener('touchend', () => this._onMouseUp());
  }

  open({ id, title, icon='🔲', html, width=820, height=540, x, y }) {
    if (this.windows[id]) {
      this.focus(id);
      const w = this.windows[id];
      if (w.minimized) {
        w.el.classList.remove('minimized');
        w.minimized = false;
      }
      return;
    }
    x = x ?? Math.max(40, (window.innerWidth - width) / 2 + (Object.keys(this.windows).length * 24 % 80));
    y = y ?? Math.max(40, (window.innerHeight - height - 80) / 2 + (Object.keys(this.windows).length * 20 % 60));

    const el = document.createElement('div');
    el.className = 'window';
    el.id = 'win_' + id;
    el.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${this.z++}`;
    el.innerHTML = `
      <div class="win-titlebar" data-win="${id}">
        <div class="win-controls">
          <div class="win-btn close" onclick="WM.close('${id}')"></div>
          <div class="win-btn minimize" onclick="WM.minimize('${id}')"></div>
          <div class="win-btn maximize" onclick="WM.toggleMax('${id}')"></div>
        </div>
        <span class="win-icon">${icon}</span>
        <span class="win-title">${title}</span>
      </div>
      <div class="win-content" id="wc_${id}">${html}</div>
      <div class="win-resize" data-win="${id}"></div>
    `;
    this.layer.appendChild(el);

    const data = { el, title, icon, minimized:false, maximized:false,
      x, y, width, height, savedRect:null };
    this.windows[id] = data;

    this._bind(el, id);
    this.focus(id);
    requestAnimationFrame(() => el.classList.add('open'));
    this._updateDock(id, true);
    return el;
  }

  close(id) {
    const w = this.windows[id];
    if (!w) return;
    w.el.classList.remove('open');
    w.el.style.opacity = '0';
    w.el.style.transform = 'scale(0.85)';
    setTimeout(() => { w.el.remove(); delete this.windows[id]; }, 250);
    this._updateDock(id, false);
  }

  minimize(id) {
    const w = this.windows[id];
    if (!w) return;
    w.minimized = !w.minimized;
    w.el.classList.toggle('minimized', w.minimized);
  }

  toggleMax(id) {
    const w = this.windows[id];
    if (!w) return;
    if (!w.maximized) {
      w.savedRect = { left: w.el.style.left, top: w.el.style.top, width: w.el.style.width, height: w.el.style.height };
      w.el.style.left='0'; w.el.style.top='0';
      w.el.style.width=window.innerWidth+'px'; w.el.style.height=(window.innerHeight-0)+'px';
      w.el.classList.add('maximized');
      w.maximized = true;
    } else {
      const r = w.savedRect;
      w.el.style.left=r.left; w.el.style.top=r.top;
      w.el.style.width=r.width; w.el.style.height=r.height;
      w.el.classList.remove('maximized');
      w.maximized = false;
    }
  }

  focus(id) {
    Object.values(this.windows).forEach(w => w.el.classList.remove('focused'));
    const w = this.windows[id];
    if (w) { w.el.style.zIndex = ++this.z; w.el.classList.add('focused'); }
  }

  _bind(el, id) {
    const titlebar = el.querySelector('.win-titlebar');
    const resizeHandle = el.querySelector('.win-resize');

    const startDrag = (e) => {
      const src = e.type.startsWith('touch') ? e.touches[0] : e;
      if (src.target.classList.contains('win-btn')) return;
      const w = this.windows[id];
      if (w.maximized) return;
      this.dragging = { id, startX: src.clientX, startY: src.clientY,
        origLeft: parseInt(el.style.left), origTop: parseInt(el.style.top) };
      this.focus(id);
      e.preventDefault();
    };
    titlebar.addEventListener('mousedown', startDrag);
    titlebar.addEventListener('touchstart', startDrag, {passive:false});

    const startResize = (e) => {
      const src = e.type.startsWith('touch') ? e.touches[0] : e;
      const w = this.windows[id];
      if (w.maximized) return;
      this.resizing = { id, startX: src.clientX, startY: src.clientY,
        origW: parseInt(el.style.width), origH: parseInt(el.style.height) };
      this.focus(id);
      e.preventDefault();
    };
    resizeHandle.addEventListener('mousedown', startResize);

    el.addEventListener('mousedown', () => this.focus(id));
  }

  _onMouseMove(e) {
    const src = e.touches ? e.touches[0] : e;
    if (this.dragging) {
      const d = this.dragging;
      const w = this.windows[d.id];
      if (!w) return;
      const nx = d.origLeft + (src.clientX - d.startX);
      const ny = Math.max(0, d.origTop + (src.clientY - d.startY));
      w.el.style.left = nx + 'px';
      w.el.style.top = ny + 'px';
    }
    if (this.resizing) {
      const r = this.resizing;
      const w = this.windows[r.id];
      if (!w) return;
      const nw = Math.max(300, r.origW + (src.clientX - r.startX));
      const nh = Math.max(200, r.origH + (src.clientY - r.startY));
      w.el.style.width = nw + 'px';
      w.el.style.height = nh + 'px';
    }
  }

  _onMouseUp() { this.dragging = null; this.resizing = null; }

  _updateDock(id, open) {
    const btn = document.getElementById('dock-' + id.split('_')[0]);
    if (btn) btn.classList.toggle('active', open);
  }
}

// === BROWSER APP ===
class OBITBrowser {
  constructor(wcId) {
    this.wc = document.getElementById(wcId);
    this.tabs = [];
    this.activeTabId = null;
    this.nextTabId = 1;
    this.bookmarks = JSON.parse(localStorage.getItem('orbit_bookmarks') || '[]');
    this.incognito = false;
    this._render();
    this.newTab('orbit://home');
  }

  _render() {
    this.wc.innerHTML = `
      <div class="browser">
        <div class="browser-tabbar" id="${this.wc.id}_tabs">
          <div class="b-tab-new" onclick="BROWSERS['${this.wc.id}'].newTab()" title="New Tab">+</div>
        </div>
        <div class="browser-nav">
          <div class="b-nav-btn" id="${this.wc.id}_back" onclick="BROWSERS['${this.wc.id}'].back()" title="Back">◀</div>
          <div class="b-nav-btn" id="${this.wc.id}_fwd" onclick="BROWSERS['${this.wc.id}'].forward()" title="Forward">▶</div>
          <div class="b-nav-btn" onclick="BROWSERS['${this.wc.id}'].reload()" title="Reload">↺</div>
          <input class="b-urlbar" id="${this.wc.id}_url" placeholder="Search or enter URL... (proxied via Scramjet)"
            onkeydown="if(event.key==='Enter')BROWSERS['${this.wc.id}'].navigateInput(this.value)"
            onfocus="this.select()">
          <div class="b-extras">
            <div class="b-extra-btn" onclick="BROWSERS['${this.wc.id}'].toggleBookmark()" title="Bookmark">☆</div>
            <div class="b-extra-btn" onclick="BROWSERS['${this.wc.id}'].toggleBookmarkPanel()" title="Bookmarks">📚</div>
            <div class="b-extra-btn" onclick="BROWSERS['${this.wc.id}'].toggleIncognito()" id="${this.wc.id}_incog" title="Incognito">🕵</div>
          </div>
        </div>
        <div class="b-bookmarks-bar" id="${this.wc.id}_bkmbar"></div>
        <div class="browser-main" id="${this.wc.id}_main">
          <div class="b-loading" id="${this.wc.id}_loader"></div>
          <div id="${this.wc.id}_frames"></div>
          <div class="b-bkm-panel" id="${this.wc.id}_bkmpanel">
            <div class="b-bkm-header">BOOKMARKS</div>
            <div class="b-bkm-list" id="${this.wc.id}_bkmlist"></div>
          </div>
        </div>
        <div class="b-status" id="${this.wc.id}_status"></div>
      </div>
    `;
    this._renderBookmarksBar();
  }

  newTab(url = 'orbit://home') {
    const id = this.nextTabId++;
    const tab = {
      id, url, displayUrl: url,
      title: url === 'orbit://home' ? 'New Tab' : url,
      history: [url], historyIndex: 0,
      loading: false, favicon: '🌐', el: null, frameEl: null
    };
    this.tabs.push(tab);
    this._renderTab(tab);
    this._createFrame(tab);
    this.activateTab(id);
    if (url !== 'orbit://home') this.navigate(url, id);
    return tab;
  }

  _renderTab(tab) {
    const tabbar = document.getElementById(this.wc.id + '_tabs');
    const newBtn = tabbar.querySelector('.b-tab-new');
    const el = document.createElement('div');
    el.className = 'b-tab';
    el.id = `${this.wc.id}_tab_${tab.id}`;
    el.onclick = (e) => { if (!e.target.classList.contains('b-tab-close')) this.activateTab(tab.id); };
    el.innerHTML = `
      <span style="font-size:12px">${tab.favicon}</span>
      <span class="b-tab-title">${tab.title.substring(0,20)}</span>
      <span class="b-tab-close" onclick="BROWSERS['${this.wc.id}'].closeTab(${tab.id})">×</span>
    `;
    tabbar.insertBefore(el, newBtn);
    tab.el = el;
  }

  _createFrame(tab) {
    const frames = document.getElementById(this.wc.id + '_frames');
    const wrap = document.createElement('div');
    wrap.className = 'b-frame-wrap';
    wrap.id = `${this.wc.id}_frame_${tab.id}`;
    wrap.style.display = 'none';
    wrap.innerHTML = this._homeHTML();
    frames.appendChild(wrap);
    tab.frameEl = wrap;
  }

  activateTab(id) {
    this.tabs.forEach(t => {
      if (t.el) t.el.classList.toggle('active', t.id === id);
      if (t.frameEl) t.frameEl.style.display = t.id === id ? 'block' : 'none';
    });
    this.activeTabId = id;
    this._updateNavBar();
  }

  closeTab(id) {
    const idx = this.tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const tab = this.tabs[idx];
    if (tab.el) tab.el.remove();
    if (tab.frameEl) tab.frameEl.remove();
    this.tabs.splice(idx, 1);
    if (this.tabs.length === 0) this.newTab();
    else if (this.activeTabId === id) {
      this.activateTab(this.tabs[Math.min(idx, this.tabs.length - 1)].id);
    }
  }

  get activeTab() { return this.tabs.find(t => t.id === this.activeTabId); }

  navigateInput(raw) {
    let url = raw.trim();
    if (!url) return;
    if (!url.startsWith('orbit://') && !url.match(/^https?:\/\//i) && !url.includes('.')) {
      url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
    }
    this.navigate(url);
  }

  navigate(url, tabId = this.activeTabId) {
    const tab = this.tabs.find(t => t.id === tabId);
    if (!tab) return;
    const proxied = Scramjet.rewrite(url);
    const display = url;
    tab.history = tab.history.slice(0, tab.historyIndex + 1);
    tab.history.push(url);
    tab.historyIndex = tab.history.length - 1;
    tab.url = url;
    tab.displayUrl = display;
    this._loadFrame(tab, url, proxied);
    this._updateNavBar();
  }

  back() {
    const tab = this.activeTab;
    if (!tab || tab.historyIndex <= 0) return;
    tab.historyIndex--;
    tab.url = tab.history[tab.historyIndex];
    this._loadFrame(tab, tab.url, Scramjet.rewrite(tab.url));
    this._updateNavBar();
  }

  forward() {
    const tab = this.activeTab;
    if (!tab || tab.historyIndex >= tab.history.length - 1) return;
    tab.historyIndex++;
    tab.url = tab.history[tab.historyIndex];
    this._loadFrame(tab, tab.url, Scramjet.rewrite(tab.url));
    this._updateNavBar();
  }

  reload() {
    const tab = this.activeTab;
    if (!tab) return;
    this._loadFrame(tab, tab.url, Scramjet.rewrite(tab.url));
  }

  _loadFrame(tab, originalUrl, proxiedUrl) {
    if (originalUrl === 'orbit://home') {
      tab.frameEl.innerHTML = this._homeHTML();
      tab.title = 'New Tab';
      this._updateTab(tab);
      this._updateUrlBar(originalUrl);
      this._setLoading(false);
      return;
    }

    // Show scramjet proxy info page
    this._setLoading(true);
    tab.frameEl.innerHTML = this._proxyInfoHTML(originalUrl, proxiedUrl);
    tab.title = this._getDomain(originalUrl);
    this._updateTab(tab);
    this._updateUrlBar(originalUrl);

    setTimeout(() => this._setLoading(false), 1200);
  }

  _homeHTML() {
    const shortcuts = [
      {icon:'🔍',name:'Google',url:'https://google.com'},
      {icon:'📰',name:'News',url:'https://news.ycombinator.com'},
      {icon:'🐙',name:'GitHub',url:'https://github.com'},
      {icon:'▶️',name:'YouTube',url:'https://youtube.com'},
      {icon:'🐦',name:'Twitter',url:'https://twitter.com'},
      {icon:'🤖',name:'Claude',url:'https://claude.ai'},
    ];
    const shortcutsHtml = shortcuts.map(s =>
      `<div class="b-quick-link" onclick="BROWSERS['${this.wc.id}'].navigate('${s.url}')">
        <div class="b-quick-link-ico">${s.icon}</div>
        <span>${s.name}</span>
       </div>`).join('');
    return `
      <div class="b-home">
        <div class="b-home-logo">ORBIT</div>
        <div style="font-size:12px;color:var(--text-dim);letter-spacing:1px">Browser · Powered by Scramjet</div>
        <div class="b-search">
          <input class="b-search-bar" placeholder="Search the web or enter URL..."
            onkeydown="if(event.key==='Enter')BROWSERS['${this.wc.id}'].navigateInput(this.value)">
          <div class="b-search-btn" onclick="BROWSERS['${this.wc.id}'].navigateInput(this.previousElementSibling.value)">🔍</div>
        </div>
        <div class="b-quick-links">${shortcutsHtml}</div>
        <div style="margin-top:8px;font-size:10px;color:var(--text-muted);text-align:center;letter-spacing:1px">
          🛡 ORBIT Browser v1.0 · Scramjet Proxy Engine · Bare Server Protocol v3
        </div>
      </div>
    `;
  }

  _proxyInfoHTML(url, proxied) {
    const domain = this._getDomain(url);
    const isSecure = url.startsWith('https://');
    return `
      <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg2);padding:32px;overflow-y:auto">
        <div style="font-size:40px">${isSecure ? '🔒' : '🌐'}</div>
        <div style="font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--blue)">${domain}</div>
        <div style="font-size:12px;color:var(--text-dim);text-align:center;max-width:500px">
          In production, this page loads through the <strong style="color:var(--blue)">Scramjet service worker</strong> 
          connecting to your <strong style="color:var(--purple)">Bare server</strong>. 
          Deploy the backend to enable live proxying.
        </div>
        <div class="b-scramjet-info">
          <strong>📡 Original URL</strong>${url}
          <strong style="margin-top:8px;display:block">🔀 Scramjet Proxied URL (encoded)</strong>${proxied}
          <strong style="margin-top:8px;display:block">⚙️ Bare Server Endpoint</strong>${Scramjet.BARE_SERVER}
          <strong style="margin-top:8px;display:block">🔧 Service Worker Path</strong>${Scramjet.SW_PATH}
          <strong style="margin-top:8px;display:block">🔑 Codec</strong>base64url (URL-safe, no padding)
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
          <div onclick="BROWSERS['${this.wc.id}'].navigate('${url}')" 
               style="padding:8px 20px;border-radius:20px;background:linear-gradient(135deg,var(--blue),var(--purple));cursor:pointer;font-size:12px;font-weight:600;box-shadow:var(--glow-b)">
            ↗ Open Directly
          </div>
          <div onclick="BROWSERS['${this.wc.id}'].back()"
               style="padding:8px 20px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-dim)">
            ← Back
          </div>
        </div>
        <div style="margin-top:8px;font-size:10px;color:var(--text-muted);text-align:center;max-width:420px;line-height:1.6">
          Deploy <span style="color:var(--blue)">@mercuryworkshop/bare-server-node</span> + 
          register <span style="color:var(--purple)">scramjet-controller</span> service worker to enable live proxy
        </div>
      </div>
    `;
  }

  _getDomain(url) {
    try { return new URL(url).hostname; } catch { return url.substring(0,30); }
  }

  _updateNavBar() {
    const tab = this.activeTab;
    if (!tab) return;
    const urlInput = document.getElementById(this.wc.id + '_url');
    if (urlInput) urlInput.value = tab.url === 'orbit://home' ? '' : tab.url;
    const back = document.getElementById(this.wc.id + '_back');
    const fwd = document.getElementById(this.wc.id + '_fwd');
    if (back) back.classList.toggle('disabled', tab.historyIndex <= 0);
    if (fwd) fwd.classList.toggle('disabled', tab.historyIndex >= tab.history.length - 1);
  }

  _updateUrlBar(url) {
    const el = document.getElementById(this.wc.id + '_url');
    if (el) el.value = url === 'orbit://home' ? '' : url;
  }

  _updateTab(tab) {
    if (!tab.el) return;
    const title = tab.el.querySelector('.b-tab-title');
    if (title) title.textContent = tab.title.substring(0, 18);
  }

  _setLoading(on) {
    const loader = document.getElementById(this.wc.id + '_loader');
    if (loader) loader.classList.toggle('show', on);
  }

  toggleBookmark() {
    const tab = this.activeTab;
    if (!tab || tab.url === 'orbit://home') return;
    const idx = this.bookmarks.findIndex(b => b.url === tab.url);
    if (idx >= 0) this.bookmarks.splice(idx, 1);
    else this.bookmarks.push({ url: tab.url, title: tab.title, favicon: '🔖' });
    localStorage.setItem('orbit_bookmarks', JSON.stringify(this.bookmarks));
    this._renderBookmarksBar();
    this._renderBookmarksList();
  }

  toggleBookmarkPanel() {
    const panel = document.getElementById(this.wc.id + '_bkmpanel');
    if (panel) { panel.classList.toggle('open'); this._renderBookmarksList(); }
  }

  _renderBookmarksBar() {
    const bar = document.getElementById(this.wc.id + '_bkmbar');
    if (!bar) return;
    bar.innerHTML = this.bookmarks.slice(0, 8).map(b =>
      `<div class="b-bookmark" onclick="BROWSERS['${this.wc.id}'].navigate('${b.url}')" 
            onmouseover="BROWSERS['${this.wc.id}']._showStatus('${b.url}')"
            onmouseout="BROWSERS['${this.wc.id}']._hideStatus()">
         ${b.favicon} ${b.title.substring(0,20)}
       </div>`).join('');
  }

  _renderBookmarksList() {
    const list = document.getElementById(this.wc.id + '_bkmlist');
    if (!list) return;
    list.innerHTML = this.bookmarks.length ? this.bookmarks.map((b,i) =>
      `<div class="b-bkm-item">
        <span onclick="BROWSERS['${this.wc.id}'].navigate('${b.url}')" style="flex:1">${b.favicon} ${b.title.substring(0,24)}</span>
        <span class="b-bkm-del" onclick="BROWSERS['${this.wc.id}'].removeBookmark(${i})">✕</span>
       </div>`).join('') :
      `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No bookmarks yet</div>`;
  }

  removeBookmark(i) {
    this.bookmarks.splice(i, 1);
    localStorage.setItem('orbit_bookmarks', JSON.stringify(this.bookmarks));
    this._renderBookmarksBar();
    this._renderBookmarksList();
  }

  toggleIncognito() {
    this.incognito = !this.incognito;
    const btn = document.getElementById(this.wc.id + '_incog');
    const urlbar = document.getElementById(this.wc.id + '_url');
    if (btn) btn.style.background = this.incognito ? 'rgba(139,92,246,0.2)' : '';
    if (urlbar) urlbar.classList.toggle('incognito', this.incognito);
  }

  _showStatus(url) {
    const el = document.getElementById(this.wc.id + '_status');
    if (el) { el.textContent = url; el.classList.add('show'); }
  }

  _hideStatus() {
    const el = document.getElementById(this.wc.id + '_status');
    if (el) el.classList.remove('show');
  }
}

// === NOTES APP ===
class NotesApp {
  constructor(wcId) {
    this.wc = document.getElementById(wcId);
    this.notes = JSON.parse(localStorage.getItem('orbit_notes') || '[]');
    if (this.notes.length === 0) this.notes.push({
      id: 1, title: 'Welcome to ORBIT Notes', content: 'Start writing your thoughts here...\n\nNotes auto-save as you type.',
      date: new Date().toLocaleDateString()
    });
    this.activeId = this.notes[0].id;
    this.nextId = Math.max(...this.notes.map(n => n.id)) + 1;
    this._render();
  }

  _render() {
    this.wc.innerHTML = `
      <div class="notes">
        <div class="notes-sidebar">
          <div class="notes-sidebar-header">
            <span class="notes-sidebar-title">NOTES</span>
            <div class="notes-add-btn" onclick="NOTES['${this.wc.id}'].newNote()">+</div>
          </div>
          <div id="${this.wc.id}_list"></div>
        </div>
        <div class="notes-editor">
          <div class="notes-editor-header">
            <input class="notes-title-input" id="${this.wc.id}_title" placeholder="Title..."
              oninput="NOTES['${this.wc.id}'].saveTitle(this.value)">
            <div class="notes-del-btn" onclick="NOTES['${this.wc.id}'].deleteNote()">🗑</div>
          </div>
          <textarea class="notes-body" id="${this.wc.id}_body" placeholder="Start writing..."
            oninput="NOTES['${this.wc.id}'].saveBody(this.value)"></textarea>
        </div>
      </div>
    `;
    this._renderList();
    this._loadNote(this.activeId);
  }

  _renderList() {
    const list = document.getElementById(this.wc.id + '_list');
    list.innerHTML = this.notes.map(n => `
      <div class="note-item${n.id === this.activeId ? ' active' : ''}" onclick="NOTES['${this.wc.id}']._loadNote(${n.id})">
        <div class="note-item-title">${n.title || 'Untitled'}</div>
        <div class="note-item-preview">${n.content.substring(0,40)}</div>
        <div class="note-item-date">${n.date}</div>
      </div>`).join('');
  }

  _loadNote(id) {
    this.activeId = id;
    const note = this.notes.find(n => n.id === id);
    if (!note) return;
    document.getElementById(this.wc.id + '_title').value = note.title;
    document.getElementById(this.wc.id + '_body').value = note.content;
    this._renderList();
  }

  saveTitle(val) {
    const n = this.notes.find(n => n.id === this.activeId);
    if (n) { n.title = val; n.date = new Date().toLocaleDateString(); this._save(); this._renderList(); }
  }

  saveBody(val) {
    const n = this.notes.find(n => n.id === this.activeId);
    if (n) { n.content = val; n.date = new Date().toLocaleDateString(); this._save(); }
  }

  newNote() {
    const n = { id: this.nextId++, title: '', content: '', date: new Date().toLocaleDateString() };
    this.notes.unshift(n);
    this._save();
    this._loadNote(n.id);
  }

  deleteNote() {
    if (this.notes.length === 1) return;
    this.notes = this.notes.filter(n => n.id !== this.activeId);
    this._save();
    this._loadNote(this.notes[0].id);
  }

  _save() { localStorage.setItem('orbit_notes', JSON.stringify(this.notes)); }
}

  async send() {

    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    this._addMsg('user', text);
    this.loading = true;
    this._showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are NOVA, the AI assistant built into ORBIT OS — a futuristic browser operating system. You have a helpful, concise, space-themed personality. Keep responses to 2-4 sentences unless the user needs more detail. You know about ORBIT\'s features: Scramjet proxy browser, window manager, Notes, File Manager, Terminal, Snake game. Use occasional space/tech metaphors. Format code in backticks.',
          messages: this.history.slice(-10).filter(m => m.role !== 'assistant' || m.content !== this.history[this.history.length-1]?.content)
            .concat([{ role: 'user', content: text }])
        })
      });
      const data = await res.json();
      this._removeTyping();
      const reply = data.content?.[0]?.text || 'Signal lost. Please try again.';
      this._addMsg('ai', reply);
    } catch {
      this._removeTyping();
      this._addMsg('ai', 'Connection error. Make sure you\'re running in the Claude artifact environment. 🛰️');
    }
    this.loading = false;
  }

  clear() {
    this.history = [];
    document.getElementById(this.wc.id + '_msgs').innerHTML = '';
    setTimeout(() => this._addMsg('ai', 'Chat cleared. Ready for a new mission, Commander. 🚀'), 200);
  }
}

    const grid = document.getElementById(this.wc.id + '_grid');
    const items = this.fs[this.cwd] || [];
    grid.innerHTML = items.map((item,i) => `
      <div class="fm-item${this.selected === i ? ' selected' : ''}"
           onclick="FM['${this.wc.id}'].select(${i})"
           ondblclick="FM['${this.wc.id}'].open(${i})">
        <div class="fm-item-icon">${item.icon}</div>
        <div class="fm-item-name">${item.name}</div>

    this.selected = null;
    document.getElementById(this.wc.id + '_sel').textContent = 'Nothing selected';

    this.selected = i;
    const item = (this.fs[this.cwd] || [])[i];
    document.getElementById(this.wc.id + '_sel').textContent = item ? `${item.name}${item.size ? ' · ' + item.size : ''}` : '';

      el.classList.toggle('selected', j === i));
  }

  open(i) {
    const item = (this.fs[this.cwd] || [])[i];
    if (!item) return;
    if (item.type === 'dir') this.cd(this.cwd + '/' + item.name.replace('~/', '').replace('~', ''));
  }

  cd(path) {
    if (!this.fs[path]) {
      this.fs[path] = [];
    }
    this.cwd = path;
    this._renderGrid();
    document.querySelectorAll(`#${this.wc.id.split('_')[0]}_ .fm-sidebar-item`).forEach(el =>
      el.classList.remove('active'));
  }

  goUp() {
    const parts = this.cwd.split('/');
    if (parts.length > 1) this.cd(parts.slice(0,-1).join('/') || '~');
    else this.cd('~');
  }

  goHome() { this.cd('~'); }

  newFolder() {
    const name = prompt('Folder name:');
    if (!name) return;
    if (!this.fs[this.cwd]) this.fs[this.cwd] = [];
    this.fs[this.cwd].unshift({ name, type:'dir', icon:'📁' });
    this._renderGrid();
  }

  newFile() {
    const name = prompt('File name:');
    if (!name) return;
    if (!this.fs[this.cwd]) this.fs[this.cwd] = [];
    this.fs[this.cwd].unshift({ name, type:'file', icon:'📄', size:'0 B' });
    this._renderGrid();
  }
}

// === SNAKE GAME ===
class SnakeGame {
  constructor(wcId) {
    this.wc = document.getElementById(wcId);
    this.GRID = 20; this.CELL = 16;
    this.snake = [{x:10,y:10}];
    this.dir = {x:1,y:0};
    this.food = this._spawnFood();
    this.score = 0;
    this.running = false;
    this.interval = null;
    this._render();
    this._keyHandler = e => this._key(e);
    document.addEventListener('keydown', this._keyHandler);
  }

  _render() {
    this.wc.innerHTML = `
      <div class="snake">
        <div class="snake-score">SCORE: <span id="${this.wc.id}_score">0</span></div>
        <canvas class="snake-canvas" id="${this.wc.id}_canvas" 
          width="${this.GRID*this.CELL}" height="${this.GRID*this.CELL}"></canvas>
        <div class="snake-controls">↑↓←→ or WASD to move · P to pause</div>
        <div class="snake-overlay" id="${this.wc.id}_overlay">
          <div style="font-size:40px">🐍</div>
          <h2>COSMIC SNAKE</h2>
          <p>Guide the serpent through the cosmos</p>
          <div class="snake-btn" onclick="SNAKE['${this.wc.id}'].start()">LAUNCH 🚀</div>
        </div>
      </div>
    `;
    this.canvas = document.getElementById(this.wc.id + '_canvas');
    this.ctx = this.canvas.getContext('2d');
    this._draw();
  }

  start() {
    document.getElementById(this.wc.id + '_overlay').style.display = 'none';
    this.snake = [{x:10,y:10}];
    this.dir = {x:1,y:0};
    this.food = this._spawnFood();
    this.score = 0;
    this._updateScore();
    this.running = true;
    clearInterval(this.interval);
    this.interval = setInterval(() => this._tick(), 130);
  }

  _tick() {
    if (!this.running) return;
    const head = { x: this.snake[0].x + this.dir.x, y: this.snake[0].y + this.dir.y };
    if (head.x<0||head.x>=this.GRID||head.y<0||head.y>=this.GRID||this.snake.some(s=>s.x===head.x&&s.y===head.y)) {
      this._gameOver(); return;
    }
    this.snake.unshift(head);
    if (head.x===this.food.x&&head.y===this.food.y) {
      this.score += 10; this._updateScore(); this.food = this._spawnFood();
    } else this.snake.pop();
    this._draw();
  }

  _draw() {
    const ctx = this.ctx, G = this.GRID, C = this.CELL;
    ctx.fillStyle = '#03030f';
    ctx.fillRect(0,0,G*C,G*C);
    for (let x=0;x<G;x++) for (let y=0;y<G;y++) {
      ctx.fillStyle = (x+y)%2===0 ? 'rgba(255,255,255,0.02)' : 'transparent';
      ctx.fillRect(x*C,y*C,C,C);
    }
    // Food
    ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.arc(this.food.x*C+C/2,this.food.y*C+C/2,C/2-2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Snake
    this.snake.forEach((s,i) => {
      const t = i/this.snake.length;
      const r = Math.round(0 + t*0);
      const g = Math.round(200 - t*100);
      const b = Math.round(255 - t*100);
      ctx.shadowColor = `rgb(${r},${g},${b})`; ctx.shadowBlur = i===0?16:4;
      ctx.fillStyle = i===0 ? `rgb(${r},${g},${b})` : `rgba(${r},${g},${b},${0.9-t*0.5})`;
      const pad = i===0?1:2;
      ctx.beginPath();
      ctx.roundRect(s.x*C+pad,s.y*C+pad,C-pad*2,C-pad*2,i===0?4:3);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  _gameOver() {
    this.running = false; clearInterval(this.interval);
    const overlay = document.getElementById(this.wc.id + '_overlay');
    overlay.innerHTML = `
      <div style="font-size:40px">💫</div>
      <h2>GAME OVER</h2>

      <p>Final Score: ${this.score}</p>
      <div class="snake-btn" onclick="SNAKE['${this.wc.id}'].start()">RETRY 🔄</div>
    `;
    overlay.style.display = 'flex';
  }

  _key(e) {
    if (!this.wc.offsetParent && !document.getElementById('win_snake')) return;
    const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
                 w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    if (map[e.key]) {
      const d = map[e.key];
      if (d.x !== -this.dir.x || d.y !== -this.dir.y) { this.dir = d; e.preventDefault(); }
    }
    if (e.key==='p') this.running = !this.running;
  }

  _spawnFood() {
    let f;
    do { f={x:Math.floor(Math.random()*this.GRID),y:Math.floor(Math.random()*this.GRID)}; }
    while (this.snake.some(s=>s.x===f.x&&s.y===f.y));
    return f;
  }

  _updateScore() {
    const el = document.getElementById(this.wc.id + '_score');
    if (el) el.textContent = this.score;
  }

  destroy() { clearInterval(this.interval); document.removeEventListener('keydown',this._keyHandler); }
}

// === TERMINAL ===
class TerminalApp {
  constructor(wcId) {
    this.wc = document.getElementById(wcId);
    this.cwd = '~';
    this.history = [];
    this.hIdx = -1;
    this._render();
    this._print('\x1b[1;34mORBIT Terminal v1.0\x1b[0m — Scramjet Proxy Shell');
    this._print('Type \x1b[33mhelp\x1b[0m for available commands.\n');
  }

  _render() {
    this.wc.innerHTML = `
      <div class="terminal">
        <div class="term-output" id="${this.wc.id}_out"></div>
        <div class="term-input-row">
          <span class="term-prompt">orbit@${this.cwd}$&nbsp;</span>
          <input class="term-input" id="${this.wc.id}_in" autocomplete="off" spellcheck="false"
            onkeydown="TERM['${this.wc.id}']._onKey(event)">
        </div>
      </div>
    `;
    document.getElementById(this.wc.id + '_in').focus();
  }

  _print(text) {
    const out = document.getElementById(this.wc.id + '_out');
    const line = document.createElement('div');
    line.innerHTML = text.replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\x1b\[1;34m(.*?)\x1b\[0m/g,'<span style="color:#00c8ff;font-weight:bold">$1</span>')
      .replace(/\x1b\[33m(.*?)\x1b\[0m/g,'<span style="color:#f59e0b">$1</span>')
      .replace(/\x1b\[32m(.*?)\x1b\[0m/g,'<span style="color:#10b981">$1</span>')
      .replace(/\x1b\[31m(.*?)\x1b\[0m/g,'<span style="color:#ef4444">$1</span>');
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  _onKey(e) {
    if (e.key === 'Enter') {
      const input = document.getElementById(this.wc.id + '_in');
      const cmd = input.value.trim();
      input.value = '';
      if (cmd) { this.history.unshift(cmd); this.hIdx = -1; }
      this._print(`orbit@${this.cwd}$ ${cmd}`);
      if (cmd) this._exec(cmd);
    } else if (e.key === 'ArrowUp') {
      const input = document.getElementById(this.wc.id + '_in');
      if (this.hIdx < this.history.length-1) input.value = this.history[++this.hIdx];
    } else if (e.key === 'ArrowDown') {
      const input = document.getElementById(this.wc.id + '_in');
      this.hIdx = Math.max(-1, this.hIdx-1);
      input.value = this.hIdx >= 0 ? this.history[this.hIdx] : '';
    }
  }

  _exec(raw) {
    const [cmd, ...args] = raw.split(' ');
    const cmds = {
      help: () => this._print('\x1b[33mCommands:\x1b[0m ls, cd, pwd, echo, clear, scramjet, about, date'),
      ls: () => this._print(`\x1b[1;34m📁 Documents  📁 Downloads  📁 Pictures\x1b[0m\n📄 orbit.config.json  📄 README.txt`),
      pwd: () => this._print(`/home/orbit/${this.cwd.replace('~','')}`),
      cd: () => { this.cwd = args[0]||'~'; this._print(''); },
      echo: () => this._print(args.join(' ')),
      clear: () => { document.getElementById(this.wc.id + '_out').innerHTML=''; },
      date: () => this._print(new Date().toString()),
      about: () => this._print(`\x1b[1;34mORBIT OS v1.0\x1b[0m — Browser Operating System\nPowered by Scramjet Proxy Engine`),
      scramjet: () => {
        const sub = args[0];
        if (sub==='status') this._print('\x1b[33m[SJ]\x1b[0m Bare server: \x1b[31mOffline (backend needed)\x1b[0m\n[SJ] SW Path: ' + Scramjet.SW_PATH);
        else if (sub==='encode' && args[1]) this._print('\x1b[32m' + Scramjet.encode(args[1]) + '\x1b[0m');
        else if (sub==='decode' && args[1]) this._print('\x1b[32m' + Scramjet.decode(args[1]) + '\x1b[0m');
        else if (sub==='rewrite' && args[1]) this._print('\x1b[32m' + Scramjet.rewrite(args.slice(1).join(' ')) + '\x1b[0m');
        else this._print('Usage: scramjet [status|encode <url>|decode <str>|rewrite <url>]');
      }
    };
    if (cmds[cmd]) cmds[cmd]();
    else this._print(`\x1b[31mCommand not found: ${cmd}\x1b[0m. Type \x1b[33mhelp\x1b[0m.`);
  }
}

      scramjet:`
        <div class="arch-h1">🔀 Scramjet Proxy Engine</div>
        <div class="arch-p">Scramjet is a JavaScript rewriting engine that operates as a Service Worker. It intercepts all fetch() and XHR calls, rewrites URLs to route through the Bare server, and reconstructs responses on the client side.</div>
        <div class="arch-h2">URL Encoding Pipeline</div>
        <div class="arch-code">Input URL:      https://example.com/path?query=1
      ↓
URL Normalize:  ensure https:// prefix
      ↓
Base64URL Encode: btoa(url) → replace +→- /→_ strip =
      ↓
Scramjet URL:   __orbit_proxy__/aHR0cHM6Ly9leGFtcGxlLmNvbQ
      ↓
SW Intercepts:  fetch(__orbit_proxy__/...) → Bare Server
      ↓
Bare Server:    GET https://example.com → response
      ↓
Rewrite:        Scramjet rewrites all URLs in HTML/JS/CSS
      ↓
Rendered:       Client receives proxied, rewritten page</div>
        <div class="arch-h2">JavaScript Implementation</div>
        <div class="arch-code">// ORBIT Scramjet URL Utilities
const Scramjet = {
  PREFIX: '__orbit_proxy__/',

  encode(url) {
    const bytes = new TextEncoder().encode(url);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    // URL-safe base64 (no padding)
    return btoa(binary).replace(/\\+/g,'-').replace(/\\//g,'_').replace(/=/g,'');
  },

  rewrite(url) {
    if (!url.match(/^https?:\\/\\//i)) url = 'https://' + url;
    return this.PREFIX + this.encode(url);
  },

  extract(proxied) {
    const enc = proxied.slice(this.PREFIX.length);
    const padded = enc.replace(/-/g,'+').replace(/_/g,'/')
      + '=='.slice(0,(4-enc.length%4)%4);
    const bytes = Uint8Array.from(atob(padded), c => c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }
};</div>
        <div class="arch-h2">Service Worker Registration</div>
        <div class="arch-code">// register-sw.js (frontend)
if ('serviceWorker' in navigator) {
  const sw = await navigator.serviceWorker.register('/scramjet/worker/scramjet.worker.js', {
    scope: '/'

  // Configure the Scramjet controller
  const controller = new ScramjetController({
    prefix: '/__orbit_proxy__/',
    codec: { encode: url => btoa(url), decode: str => atob(str) },
    files: {
      wasm: '/scramjet/scramjet.wasm',

      client: '/scramjet/scramjet.client.js',

    },

  });
  
  await controller.init();
}</div>`,

        <div class="arch-h1">🛰 Bare Server v3</div>
        <div class="arch-p">The Bare server is the backend HTTP/WS proxy. It receives requests from Scramjet's service worker and forwards them to the target server, bypassing CORS and network restrictions.</div>
        <div class="arch-h2">Backend Setup (Node.js)</div>
        <div class="arch-code">// server.js — ORBIT Bare Server Backend
import { createServer } from 'node:http';
import { createBareServer } from '@mercuryworkshop/bare-server-node';
import { createReadStream, existsSync } from 'node:fs';
import { join } from 'node:path';

const bare = createBareServer('/bare/', {
  logErrors: false,
  maintainer: {
    email: 'admin@orbit.os',
    website: 'https://orbit.os',
  }
});

const server = createServer((req, res) => {
  // Let Bare handle proxy requests
  if (bare.shouldRoute(req)) {
    bare.routeRequest(req, res);
    return;
  }

  // Serve static ORBIT frontend files
  const url = req.url === '/' ? '/index.html' : req.url;
  const filePath = join('./dist', url);

  if (existsSync(filePath)) {
    const ext = filePath.split('.').pop();
    const mimeTypes = {
      html: 'text/html',
      js:   'application/javascript',
      css:  'text/css',
      wasm: 'application/wasm',
    };
    res.setHeader('Content-Type', mimeTypes[ext] || 'text/plain');
    createReadStream(filePath).pipe(res);
  } else {
    res.writeHead(404);
    res.end('Not Found');
  }
});

server.on('upgrade', (req, socket, head) => {
  if (bare.shouldRoute(req)) bare.routeUpgrade(req, socket, head);
  else socket.end();
});

server.listen(8080, () => console.log('🌌 ORBIT Bare Server → http://localhost:8080'));
</div>

        <div class="arch-h1">📑 Tab Manager Architecture</div>
        <div class="arch-p">Each tab maintains its own isolated state: URL, history stack, history index, favicon, title, and loading state. Navigation mutates the history stack correctly for back/forward support.</div>
        <div class="arch-h2">Tab Data Model</div>
        <div class="arch-code">interface Tab {
  id: number;
  url: string;           // display URL (pre-proxy)
  proxiedUrl: string;    // scramjet-encoded URL
  title: string;
  favicon: string;
  history: string[];     // navigation history stack
  historyIndex: number;  // current position in stack
  loading: boolean;
  incognito: boolean;    // if true, no history persistence
  frameEl: HTMLElement;  // the frame container element
  tabEl: HTMLElement;    // the tab button element
}</div>
        <div class="arch-h2">Navigation Algorithm</div>
        <div class="arch-code">navigate(url: string) {
  // 1. Truncate forward history (clears "forward" stack)
  tab.history = tab.history.slice(0, tab.historyIndex + 1);
  
  // 2. Push new URL onto history
  tab.history.push(url);
  tab.historyIndex = tab.history.length - 1;
  
  // 3. Encode via Scramjet
  const proxied = Scramjet.rewrite(url);
  
  // 4. Load into frame
  loadFrame(tab, proxied);
  
  // 5. Update URL bar (show original, not encoded)
  urlbar.value = url;
}

back() {
  if (tab.historyIndex <= 0) return; // already at start
  tab.historyIndex--;
  loadFrame(tab, Scramjet.rewrite(tab.history[tab.historyIndex]));
}

forward() {
  if (tab.historyIndex >= tab.history.length - 1) return;
  tab.historyIndex++;
  loadFrame(tab, Scramjet.rewrite(tab.history[tab.historyIndex]));
}</div>`,

// === CLOCK ===
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const clock = document.getElementById('dock-clock');
  const date = document.getElementById('dock-date');
  if (clock) clock.textContent = `${h}:${m}:${s}`;
  if (date) date.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
}

// === BOOT SEQUENCE ===
const WM = new WindowManager();
const STARS = new StarField();

const bootMessages = [
  'Initializing ORBIT kernel...',
  'Loading Scramjet proxy engine...',
  'Registering service worker...',
  'Connecting to Bare server...',
  'Mounting virtual filesystem...',
  'Initializing NOVA AI...',
  'Building desktop environment...',
  'Launch sequence complete ✓'
];

let bootStep = 0;
const bootBar = document.getElementById('boot-bar');
const bootStatus = document.getElementById('boot-status');

function bootTick() {
  if (bootStep >= bootMessages.length) {
    setTimeout(() => {
      document.getElementById('boot').classList.add('hidden');
      document.getElementById('os').style.display = 'block';
      ORBIT.buildDesktop();
      updateClock();
      setInterval(updateClock, 1000);
      setTimeout(() => ORBIT.openApp('browser'), 400);
    }, 300);
    return;
  }
  bootBar.style.width = ((bootStep + 1) / bootMessages.length * 100) + '%';
  bootStatus.textContent = bootMessages[bootStep];
  bootStep++;
  setTimeout(bootTick, 280 + Math.random() * 200);
}

setTimeout(bootTick, 600);
